name: Deploy Woolet

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      api: ${{ steps.filter.outputs.api }}
      web: ${{ steps.filter.outputs.web }}
      landing: ${{ steps.filter.outputs.landing }}
      shared: ${{ steps.filter.outputs.shared }}
      infra: ${{ steps.filter.outputs.infra }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            api:
              - 'apps/api/**'
              - 'apps/api/Dockerfile'
            web:
              - 'apps/web/**'
              - 'apps/web/Dockerfile'
            landing:
              - 'apps/landing/**'
              - 'apps/landing/Dockerfile'
            shared:
              - 'packages/**'
              - 'bun.lock'
              - 'package.json'
              - 'turbo.json'
              - '.dockerignore'
            infra:
              - 'deploy.sh'
              - 'docker-compose.prod.yml'
              - 'docker-compose.monitoring.yml'
              - 'nginx.conf'
              - '.env.example'
              - '.github/workflows/deploy.yml'

  setup:
    needs: changes
    if: |
      needs.changes.outputs.api == 'true' ||
      needs.changes.outputs.web == 'true' ||
      needs.changes.outputs.landing == 'true' ||
      needs.changes.outputs.shared == 'true'
    runs-on: ubuntu-latest
    outputs:
      cache-hit: ${{ steps.cache.outputs.cache-hit }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.9

      - uses: actions/cache@v4
        id: cache
        with:
          path: |
            ~/.bun/install/cache
            node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}

      - name: Install dependencies
        if: steps.cache.outputs.cache-hit != 'true'
        run: bun install

      - name: Share dependencies
        uses: actions/upload-artifact@v4
        with:
          name: node_modules
          path: node_modules
          if-no-files-found: error
          compression-level: 0

  test-api:
    needs: [changes, setup]
    if: |
      needs.changes.outputs.api == 'true' ||
      needs.changes.outputs.web == 'true' ||
      needs.changes.outputs.landing == 'true' ||
      needs.changes.outputs.shared == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.9

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint and Test API
        run: bunx turbo run lint test --filter=@woolet/api

  test-web:
    needs: [changes, setup]
    if: |
      needs.changes.outputs.api == 'true' ||
      needs.changes.outputs.web == 'true' ||
      needs.changes.outputs.landing == 'true' ||
      needs.changes.outputs.shared == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.9

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint and Test Web
        run: bunx turbo run lint test --filter=@woolet/web

  build-and-push:
    needs: [changes, test-api, test-web]
    if: |
      needs.changes.outputs.api == 'true' ||
      needs.changes.outputs.web == 'true' ||
      needs.changes.outputs.landing == 'true' ||
      needs.changes.outputs.shared == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    environment: SSH_PRIVATE_KEY
    strategy:
      fail-fast: false
      matrix:
        component: [api, web, landing]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        if: |
          needs.changes.outputs.shared == 'true' ||
          (matrix.component == 'api' && needs.changes.outputs.api == 'true') ||
          (matrix.component == 'web' && needs.changes.outputs.web == 'true') ||
          (matrix.component == 'landing' && needs.changes.outputs.landing == 'true')
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/${{ matrix.component }}

      - name: Build and push Docker image
        if: |
          needs.changes.outputs.shared == 'true' ||
          (matrix.component == 'api' && needs.changes.outputs.api == 'true') ||
          (matrix.component == 'web' && needs.changes.outputs.web == 'true') ||
          (matrix.component == 'landing' && needs.changes.outputs.landing == 'true')
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/${{ matrix.component }}/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VITE_CLERK_PUBLISHABLE_KEY=${{ secrets.VITE_CLERK_PUBLISHABLE_KEY }}
            VITE_GLITCHTIP_DSN_WEB=${{ secrets.VITE_GLITCHTIP_DSN_WEB }}
            VITE_API_URL=${{ secrets.VITE_API_URL }}
            VITE_PUBLIC_POSTHOG_KEY=${{ secrets.VITE_PUBLIC_POSTHOG_KEY }}
            VITE_PUBLIC_POSTHOG_HOST=${{ secrets.VITE_PUBLIC_POSTHOG_HOST }}

  deploy:
    needs: [changes, build-and-push]
    # Run if on main and (apps changed OR we explicitly triggered it OR we are just updating scripts)
    # We use always() and then check results because build-and-push might be skipped
    if: |
      always() &&
      github.ref == 'refs/heads/main' &&
      (needs.build-and-push.result == 'success' || needs.build-and-push.result == 'skipped')
    runs-on: ubuntu-latest
    environment: SSH_PRIVATE_KEY
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check Connectivity
        run: |
          for i in {1..3}; do
            nc -zv -w 5 ${{ secrets.SERVER_HOST }} 22 && break || sleep 5
            if [ $i -eq 3 ]; then echo "❌ SSH port 22 is unreachable"; exit 1; fi
          done
          sleep 2

      - name: Setup SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H -p ${{ secrets.SERVER_PORT || 22 }} ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Copy Files to Server
        run: |
          for i in {1..5}; do
            scp -i ~/.ssh/deploy_key \
              -P ${{ secrets.SERVER_PORT || 22 }} \
              -o StrictHostKeyChecking=no \
              docker-compose.prod.yml \
              docker-compose.monitoring.yml \
              nginx.conf \
              deploy.sh \
              .env.example \
              ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:~/woolet/ && break
            
            echo "⚠️ SCP failed, retrying in 5s... ($i/5)"
            sleep 5
            
            if [ $i -eq 5 ]; then
              echo "❌ SCP failed after 5 attempts"
              exit 1
            fi
          done

      - name: Deploy to Server
        uses: appleboy/ssh-action@v1.2.0
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          DB_ADMIN_USER: ${{ secrets.DB_ADMIN_USER }}
          DB_ADMIN_PASSWORD: ${{ secrets.DB_ADMIN_PASSWORD }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_PORT: ${{ secrets.DB_PORT }}
          GLITCHTIP_DB_PASSWORD: ${{ secrets.GLITCHTIP_DB_PASSWORD }}
          GLITCHTIP_DOMAIN: ${{ secrets.GLITCHTIP_DOMAIN }}
          GLITCHTIP_FROM_EMAIL: ${{ secrets.GLITCHTIP_FROM_EMAIL }}
          GLITCHTIP_SECRET_KEY: ${{ secrets.GLITCHTIP_SECRET_KEY }}
          REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
          CLERK_PUBLISHABLE_KEY: ${{ secrets.CLERK_PUBLISHABLE_KEY }}
          VITE_CLERK_PUBLISHABLE_KEY: ${{ secrets.VITE_CLERK_PUBLISHABLE_KEY }}
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          WOOLET_API_IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/api:main
          WOOLET_WEB_IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/web:main
          WOOLET_LANDING_IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/landing:main
          NODE_ENV: ${{ secrets.NODE_ENV }}
          API_URL: ${{ secrets.API_URL }}
          WEB_URL: ${{ secrets.WEB_URL }}
          GLITCHTIP_DSN_API: ${{ secrets.GLITCHTIP_DSN_API }}
          VITE_GLITCHTIP_DSN_WEB: ${{ secrets.VITE_GLITCHTIP_DSN_WEB }}
          VITE_PUBLIC_POSTHOG_KEY: ${{ secrets.VITE_PUBLIC_POSTHOG_KEY }}
          VITE_PUBLIC_POSTHOG_HOST: ${{ secrets.VITE_PUBLIC_POSTHOG_HOST }}
          LOG_LEVEL: ${{ secrets.LOG_LEVEL }}
          AI_PROVIDER_ORDER: ${{ secrets.AI_PROVIDER_ORDER }}
          OPEN_ROUTER_API_KEY: ${{ secrets.OPEN_ROUTER_API_KEY }}
          OPENROUTER_CHAT_MODEL: ${{ secrets.OPENROUTER_CHAT_MODEL }}
          OPENROUTER_SITE_URL: ${{ secrets.OPENROUTER_SITE_URL }}
          OPENROUTER_APP_NAME: ${{ secrets.OPENROUTER_APP_NAME }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_CHAT_MODEL: ${{ secrets.OPENAI_CHAT_MODEL }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ secrets.GEMINI_MODEL }}
          CURRENCY_API_KEY: ${{ secrets.CURRENCY_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          TWELVE_DATA: ${{ secrets.TWELVE_DATA }}
          VAPID_PUBLIC_KEY: ${{ secrets.VAPID_PUBLIC_KEY }}
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
          VAPID_SUBJECT: ${{ secrets.VAPID_SUBJECT }}
          API_CHANGED: ${{ needs.changes.outputs.api }}
          WEB_CHANGED: ${{ needs.changes.outputs.web }}
          LANDING_CHANGED: ${{ needs.changes.outputs.landing }}
          SHARED_CHANGED: ${{ needs.changes.outputs.shared }}
          CONFIG_CHANGED: ${{ needs.changes.outputs.infra }}
          INFRA_CHANGED: ${{ needs.changes.outputs.infra }}
          FORCE_DEPLOY: ${{ github.event_name == 'workflow_dispatch' }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: SERVER_HOST,DB_ADMIN_USER,DB_ADMIN_PASSWORD,DB_USER,DB_PASSWORD,DB_NAME,DB_PORT,GLITCHTIP_DB_PASSWORD,GLITCHTIP_DOMAIN,GLITCHTIP_FROM_EMAIL,GLITCHTIP_SECRET_KEY,REDIS_PASSWORD,CLERK_SECRET_KEY,CLERK_PUBLISHABLE_KEY,VITE_CLERK_PUBLISHABLE_KEY,WOOLET_API_IMAGE,WOOLET_WEB_IMAGE,WOOLET_LANDING_IMAGE,NODE_ENV,API_URL,WEB_URL,GLITCHTIP_DSN_API,VITE_GLITCHTIP_DSN_WEB,VITE_PUBLIC_POSTHOG_KEY,VITE_PUBLIC_POSTHOG_HOST,LOG_LEVEL,AI_PROVIDER_ORDER,OPEN_ROUTER_API_KEY,OPENROUTER_CHAT_MODEL,OPENROUTER_SITE_URL,OPENROUTER_APP_NAME,OPENAI_API_KEY,OPENAI_CHAT_MODEL,GEMINI_API_KEY,GEMINI_MODEL,CURRENCY_API_KEY,GROQ_API_KEY,TWELVE_DATA,VAPID_PUBLIC_KEY,VAPID_PRIVATE_KEY,VAPID_SUBJECT,API_CHANGED,WEB_CHANGED,LANDING_CHANGED,SHARED_CHANGED,CONFIG_CHANGED,INFRA_CHANGED,FORCE_DEPLOY,VITE_API_URL
          timeout: 60s
          command_timeout: 45m
          debug: true
          script: |
            cd ~/woolet
            chmod +x deploy.sh
            ./deploy.sh
